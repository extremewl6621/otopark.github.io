<!DOCTYPE html>
<html lang="tr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iSTAY PARK PRO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#e11d48', 600: '#be123c' },
                        darkbg: '#0f172a',
                        darkcard: '#1e293b'
                    }
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease, color 0.3s ease; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark .glass { background: rgba(15, 23, 42, 0.85); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .park-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .park-card:active { transform: scale(0.98); }
        #pdfTemplate { width: 100%; background: white !important; color: black !important; display: none; padding: 30px; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pdf-table th { background: #111; color: white; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; }
        .pdf-table td { border-bottom: 1px solid #eee; padding: 10px; font-size: 11px; color: #333; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-in { animation: slideIn 0.4s ease forwards; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-darkbg dark:text-slate-100 pb-24 selection:bg-brand-500 selection:text-white">

    <header class="glass fixed top-0 w-full z-40 px-4 h-16 flex items-center justify-between no-print">
        <div class="flex items-center gap-3">
            <img src="1000067482.webp" alt="Logo" class="h-10 w-auto object-contain drop-shadow-sm">
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-yellow-400 flex items-center justify-center transition hover:scale-110">
                <i id="themeIcon" class="fas fa-moon"></i>
            </button>
            <button onclick="raporuGoster()" class="bg-gradient-to-r from-brand-500 to-rose-600 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg shadow-rose-500/30 active:scale-95 flex items-center gap-2">
                <i class="fas fa-chart-pie"></i> <span>RAPOR</span>
            </button>
        </div>
    </header>

    <div id="pdfContainer">
        <div id="pdfTemplate">
            <div style="border-bottom: 4px solid #e11d48; padding-bottom: 15px; margin-bottom: 25px;">
                <h1 style="font-size: 26px; font-weight: 900; margin: 0; color:#000;">GÜNLÜK HASILAT RAPORU</h1>
                <p id="pdfDate" style="margin: 5px 0; color: #555; font-size: 12px;"></p>
            </div>
            <table class="pdf-table">
                <thead>
                    <tr><th>PLAKA</th><th>TİP</th><th>GİRİŞ</th><th>ÇIKIŞ</th><th>SÜRE</th><th>YÖNTEM</th><th>TUTAR</th></tr>
                </thead>
                <tbody id="pdfBody"></tbody>
            </table>
            <div id="pdfSummaryArea" style="margin-top: 30px;"></div>
        </div>
    </div>

    <main class="max-w-lg mx-auto pt-24 px-4">
        <div class="bg-white dark:bg-darkcard rounded-3xl p-6 shadow-xl shadow-slate-200/50 dark:shadow-none mb-8 border border-white/50 dark:border-slate-700 no-print backdrop-blur-sm">
            <div class="relative mb-5">
                <input type="text" id="plakaInput" oninput="renderList()" placeholder="34 AB 123" 
                    class="w-full h-16 bg-slate-100 dark:bg-slate-900/50 border-2 border-transparent focus:border-brand-500 dark:focus:border-brand-500 rounded-2xl text-center text-3xl font-black uppercase tracking-wider outline-none transition-all dark:text-white">
            </div>
            
            <div class="flex gap-3 mb-5">
                <button id="type_oto" onclick="setAracTipi('otomobil')" class="flex-1 py-3 rounded-xl font-bold text-xs border-2 border-brand-500 bg-brand-500 text-white transition shadow-lg shadow-rose-500/20">OTO</button>
                <button id="type_mini" onclick="setAracTipi('minibus')" class="flex-1 py-3 rounded-xl font-bold text-xs border-2 border-slate-200 dark:border-slate-700 text-slate-500 bg-transparent transition">MİNİBÜS</button>
            </div>
            
            <button onclick="aracGiris()" class="w-full bg-slate-900 dark:bg-white dark:text-black text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl active:scale-95 transition flex justify-center items-center gap-2">
                <i class="fas fa-save"></i> Girişi Kaydet
            </button>
        </div>

        <div id="aracListesi" class="space-y-4 pb-10"></div>
    </main>

    <div id="raporModal" class="hidden fixed inset-0 z-[60] flex items-end sm:items-center justify-center no-print">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="raporuKapat()"></div>
        <div class="bg-white dark:bg-slate-900 w-full max-w-lg sm:rounded-3xl rounded-t-3xl overflow-hidden max-h-[90vh] flex flex-col relative z-10 shadow-2xl animate-slide-in">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-white dark:bg-slate-900 sticky top-0">
                <h2 id="modalTitle" class="font-black text-2xl dark:text-white">Özet</h2>
                <button onclick="raporuKapat()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 transition"><i class="fas fa-times"></i></button>
            </div>
            <div class="overflow-y-auto p-6 space-y-6 bg-slate-50 dark:bg-darkbg/50 flex-1">
                <div id="raporGorunumu">
                    <div id="ozetKartlari" class="grid grid-cols-3 gap-3 mb-6"></div>
                    <div id="raporTablo" class="space-y-3"></div>
                    <div id="netCiroBox" class="bg-slate-900 dark:bg-black rounded-2xl p-6 text-white mt-4 relative overflow-hidden"></div>
                    <div class="mt-4"><button onclick="generatePDF()" class="w-full bg-brand-600 text-white py-3 rounded-xl font-bold text-xs uppercase shadow-lg"><i class="fas fa-file-pdf mr-2"></i> PDF RAPORU İNDİR</button></div>
                </div>
                <div id="tarifeGorunumu" class="hidden animate-slide-in">
                    <div id="oto_fiyat_list"></div>
                    <div id="mini_fiyat_list"></div>
                    <button onclick="tarifeleriKaydet()" class="w-full bg-brand-600 text-white py-4 rounded-xl font-bold uppercase shadow-lg mt-4">Fiyatları Kaydet</button>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-4 pt-4 border-t border-slate-200">
                    <button id="btnTarife" onclick="toggleView('tarife')" class="bg-white dark:bg-slate-800 border py-3 rounded-xl font-bold text-[10px] uppercase">Fiyatları Düzenle</button>
                    <button onclick="raporuSifirla()" class="bg-rose-50 text-rose-600 border py-3 rounded-xl font-bold text-[10px] uppercase">Sıfırla</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-6 no-print">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeEditModal()"></div>
        <div class="bg-white dark:bg-darkcard w-full max-w-xs rounded-3xl p-6 shadow-2xl relative z-10 animate-slide-in">
            <h3 class="font-black text-slate-800 dark:text-white mb-4 text-center">Giriş Saatini Ayarla</h3>
            <input type="datetime-local" id="editDateTime" class="w-full bg-slate-50 dark:bg-slate-900 border-2 rounded-2xl p-4 mb-6 font-bold outline-none focus:border-brand-500">
            <div class="flex gap-3">
                <button onclick="closeEditModal()" class="flex-1 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold text-xs uppercase">Vazgeç</button>
                <button id="saveEditBtn" class="flex-1 py-3 bg-brand-600 text-white rounded-xl font-bold text-xs uppercase shadow-lg">GÜNCELLE</button>
            </div>
        </div>
    </div>

    <script>
        // TEMA VE AYARLAR
        function initTheme() { if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun'); } }
        function toggleTheme() { if (document.documentElement.classList.contains('dark')) { document.documentElement.classList.remove('dark'); localStorage.theme = 'light'; document.getElementById('themeIcon').classList.replace('fa-sun', 'fa-moon'); } else { document.documentElement.classList.add('dark'); localStorage.theme = 'dark'; document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun'); } }
        initTheme();

        let varsayilanTarife = { otomobil: { baslangic: 150, artis: 50 }, minibus: { baslangic: 200, artis: 70 } };
        let aktifTarife = JSON.parse(localStorage.getItem('istay_tarifeler')) || varsayilanTarife;
        let araclar = JSON.parse(localStorage.getItem('istay_park_data')) || [];
        let seciliAracTipi = 'otomobil';

        // GÜNCELLENMİŞ HASSAS ÜCRET HESAPLAMA
        function ucretHesapla(girisTarihi, tip) {
            const simdi = new Date();
            const giris = new Date(girisTarihi);
            const farkMs = simdi - giris; // Giriş ile şu an arasındaki fark
            
            const t = aktifTarife[tip] || aktifTarife.otomobil;
            
            // Eğer saat geleceğe ayarlanmışsa ücret sadece başlangıçtır
            if (farkMs <= 0) return t.baslangic;

            const toplamDakika = Math.floor(farkMs / 60000);
            const tamSaatler = Math.floor(toplamDakika / 60);
            
            // Başlangıç Fiyatı + (Tam Saat Sayısı * Saatlik Artış)
            return t.baslangic + (tamSaatler * t.artis);
        }

        // GÜNCELLENMİŞ SÜRE HESAPLAMA (COUNT-UP)
        function sureHesapla(g, c = new Date()) { 
            const f = new Date(c) - new Date(g); 
            if (f <= 0) return "0s 0dk"; // Gelecek zaman ise 0 gösterir, geri saymaz
            const saat = Math.floor(f / 3600000);
            const dk = Math.floor((f % 3600000) / 60000);
            return saat + "s " + dk + "dk"; 
        }

        function renderList() {
            const filtre = document.getElementById('plakaInput').value.toUpperCase();
            const liste = document.getElementById('aracListesi');
            liste.innerHTML = '';
            
            let gosterilecekler = araclar.filter(a => a.plaka.includes(filtre)).sort((a, b) => new Date(b.giris) - new Date(a.giris));

            gosterilecekler.forEach(arac => {
                const isComp = arac.durum === 'tamamlandi';
                const ucret = isComp ? arac.tutar : ucretHesapla(arac.giris, arac.tip);
                const bitisZamani = isComp ? arac.cikis : new Date();
                const sureStr = sureHesapla(arac.giris, bitisZamani);

                const card = document.createElement('div');
                card.className = `park-card animate-slide-in relative p-5 rounded-3xl border border-transparent ${isComp ? 'bg-slate-200/50 dark:bg-slate-800/40 opacity-70' : 'bg-white dark:bg-darkcard shadow-lg border-l-[6px] border-l-brand-500'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex gap-4 items-center">
                             <div class="w-12 h-12 rounded-2xl bg-rose-50 dark:bg-rose-900/20 text-brand-500 flex items-center justify-center text-xl shadow-sm"><i class="fas ${arac.tip==='minibus' ? 'fa-shuttle-van' : 'fa-car'}"></i></div>
                             <div>
                                <h3 class="text-xl font-black text-slate-800 dark:text-white leading-none">${arac.plaka}</h3>
                                <div onclick="openEditModal(${arac.id})" class="text-[10px] font-bold text-slate-400 mt-2 cursor-pointer hover:text-brand-500 transition uppercase">
                                    <i class="far fa-clock"></i> Giriş: ${new Date(arac.giris).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} • <span>${sureStr}</span>
                                    ${!isComp ? '<span class="bg-slate-100 dark:bg-slate-700 px-1.5 py-0.5 rounded ml-1 font-black">DÜZENLE</span>' : ''}
                                </div>
                             </div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black text-brand-600 tracking-tight">${ucret}<small class="text-sm font-bold text-slate-400 ml-1">TL</small></div>
                        </div>
                    </div>

                    ${!isComp ? `
                    <div class="grid grid-cols-2 gap-3 mt-4 pt-4 border-t border-slate-100 dark:border-slate-700/50">
                        <button onclick="cikisYap(${arac.id}, 'KART')" class="h-16 rounded-2xl font-black text-xs text-white bg-emerald-600 shadow-lg shadow-emerald-500/30 hover:scale-[1.02] active:scale-95 transition uppercase flex items-center justify-center gap-2"><i class="fas fa-credit-card text-lg"></i> KREDİ KARTI</button>
                        <button onclick="cikisYap(${arac.id}, 'NAKİT')" class="h-16 rounded-2xl font-black text-xs text-white bg-amber-500 shadow-lg shadow-amber-500/30 hover:scale-[1.02] active:scale-95 transition uppercase flex items-center justify-center gap-2"><i class="fas fa-coins text-lg"></i> NAKİT</button>
                    </div>` : `
                    <div class="flex justify-end mt-2 pt-2 border-t border-slate-100 dark:border-slate-700/50">
                        <span class="text-[10px] font-black text-slate-400 uppercase bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full"><i class="fas fa-check-circle mr-1"></i> ${arac.odemeYontemi} ÖDEME</span>
                    </div>`}
                    
                    <button onclick="sil(${arac.id})" class="absolute top-2 right-2 w-8 h-8 rounded-full flex items-center justify-center text-slate-300 hover:text-rose-500 transition"><i class="fas fa-trash-alt text-[10px]"></i></button>
                `;
                liste.appendChild(card);
            });
        }

        function openEditModal(id) {
            const a = araclar.find(a => a.id === id);
            if(a.durum === 'tamamlandi') return;
            const g = new Date(a.giris);
            document.getElementById('editDateTime').value = new Date(g.getTime() - g.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('saveEditBtn').onclick = () => {
                a.giris = new Date(document.getElementById('editDateTime').value).toISOString();
                localStorage.setItem('istay_park_data', JSON.stringify(araclar));
                renderList(); // Düzeltme anında listeyi yenile
                closeEditModal();
            };
        }

        function aracGiris() { 
            const inp = document.getElementById('plakaInput'); const plaka = inp.value.trim().toUpperCase(); if(!plaka) return;
            araclar.push({ id: Date.now(), plaka, tip: seciliAracTipi, giris: new Date().toISOString(), durum: 'aktif' }); 
            localStorage.setItem('istay_park_data', JSON.stringify(araclar)); inp.value = ""; renderList(); 
        }

        function cikisYap(id, yontem) { 
            const a = araclar.find(x => x.id === id); a.tutar = ucretHesapla(a.giris, a.tip); 
            a.cikis = new Date().toISOString(); a.odemeYontemi = yontem; a.durum = 'tamamlandi'; 
            localStorage.setItem('istay_park_data', JSON.stringify(araclar)); renderList(); 
        }

        function generatePDF() {
            const bugun = new Date().toLocaleDateString('tr-TR');
            const bugunCikislar = araclar.filter(a => a.durum === 'tamamlandi' && new Date(a.cikis).toLocaleDateString('tr-TR') === bugun);
            document.getElementById('pdfDate').innerText = "Rapor Tarihi: " + bugun + " " + new Date().toLocaleTimeString();
            let rows = "", total = 0;
            bugunCikislar.forEach(a => {
                total += a.tutar;
                rows += `<tr><td>${a.plaka}</td><td>${a.tip.toUpperCase()}</td><td>${new Date(a.giris).toLocaleTimeString()}</td><td>${new Date(a.cikis).toLocaleTimeString()}</td><td>${sureHesapla(a.giris, a.cikis)}</td><td>${a.odemeYontemi}</td><td>${a.tutar} TL</td></tr>`;
            });
            document.getElementById('pdfBody').innerHTML = rows;
            document.getElementById('pdfSummaryArea').innerHTML = `<div style="background:#f8fafc; padding:20px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; font-weight:900;"><span style="color:#64748b; font-size:12px; text-transform:uppercase;">GÜNLÜK TOPLAM HASILAT:</span><span style="color:#e11d48; font-size:22px;">${total} TL</span></div>`;
            const element = document.getElementById('pdfTemplate'); element.style.display = 'block';
            html2pdf().set({ margin: 0.5, filename: `iSTAY_Rapor_${bugun}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(element).save().then(() => element.style.display = 'none');
        }

        function raporuGoster() {
            const bugun = new Date().toLocaleDateString('tr-TR');
            const bugunCikislar = araclar.filter(a => a.durum === 'tamamlandi' && new Date(a.cikis).toLocaleDateString('tr-TR') === bugun);
            let kart = 0, nakit = 0, tabloHtml = "";
            bugunCikislar.forEach(a => {
                if(a.odemeYontemi === 'KART') kart += a.tutar; else nakit += a.tutar;
                tabloHtml += `<div class="flex justify-between items-center p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 shadow-sm"><div class="font-black text-xs dark:text-white">${a.plaka} <span class="text-[9px] text-slate-400 ml-2 tracking-widest font-bold">${a.odemeYontemi}</span></div><span class="font-black text-xs text-brand-600">${a.tutar} TL</span></div>`;
            });
            const makeCard = (t, v, c) => `<div class="${c} p-4 rounded-2xl text-white shadow-lg"><div class="text-[9px] font-bold opacity-80 uppercase mb-1">${t}</div><div class="text-lg font-black">${v} TL</div></div>`;
            document.getElementById('ozetKartlari').innerHTML = makeCard('KART', kart, 'bg-emerald-600') + makeCard('NAKİT', nakit, 'bg-amber-500') + makeCard('TOPLAM', kart+nakit, 'bg-slate-900');
            document.getElementById('raporTablo').innerHTML = tabloHtml || `<div class="text-center py-6 text-slate-400 text-[10px] font-black uppercase tracking-widest">Henüz İşlem Yok</div>`;
            document.getElementById('netCiroBox').innerHTML = `<div class="relative z-10"><h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Günlük Toplam</h4><p class="text-3xl font-black text-white tracking-tight">${kart+nakit} TL</p></div><i class="fas fa-lira-sign absolute right-4 text-4xl opacity-10"></i>`;
            document.getElementById('raporModal').classList.remove('hidden'); toggleView('rapor');
        }

        function tarifeleriKaydet() { 
            ['otomobil', 'minibus'].forEach(tip => {
                aktifTarife[tip] = { 
                    baslangic: parseInt(document.getElementById(`${tip}_baslangic`).value) || 0, 
                    artis: parseInt(document.getElementById(`${tip}_artis`).value) || 0 
                };
            });
            localStorage.setItem('istay_tarifeler', JSON.stringify(aktifTarife)); toggleView('rapor'); renderList(); 
        }

        function renderTarifeInputs() { 
            const gen = (tip, target) => { 
                const t = aktifTarife[tip];
                document.getElementById(target).innerHTML = `
                    <h4 class="font-black text-[10px] text-slate-400 uppercase mb-2 mt-4">${tip.toUpperCase()} Fiyatlandırma</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border">
                            <label class="block text-[8px] font-bold text-slate-400 uppercase mb-1">Başlangıç (1. Saat)</label>
                            <input type="number" id="${tip}_baslangic" value="${t.baslangic}" class="w-full font-black text-xl bg-transparent outline-none dark:text-white">
                        </div>
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border">
                            <label class="block text-[8px] font-bold text-slate-400 uppercase mb-1">Saatlik Artış (+)</label>
                            <input type="number" id="${tip}_artis" value="${t.artis}" class="w-full font-black text-xl bg-transparent outline-none dark:text-white">
                        </div>
                    </div>`;
            }; gen('otomobil', 'oto_fiyat_list'); gen('minibus', 'mini_fiyat_list'); 
        }

        function sil(id) { if(confirm('Silinsin mi?')) { araclar = araclar.filter(a => a.id !== id); localStorage.setItem('istay_park_data', JSON.stringify(araclar)); renderList(); } }
        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }
        function raporuKapat() { document.getElementById('raporModal').classList.add('hidden'); }
        function toggleView(v) { document.getElementById('raporGorunumu').style.display = v==='rapor'?'block':'none'; document.getElementById('tarifeGorunumu').style.display = v==='tarife'?'block':'none'; if(v==='tarife') renderTarifeInputs(); }
        function setAracTipi(t) { seciliAracTipi = t; document.getElementById('type_oto').className = t==='otomobil'?'flex-1 py-3 rounded-xl font-bold text-xs border-2 border-brand-500 bg-brand-500 text-white transition shadow-lg shadow-rose-500/20':'flex-1 py-3 rounded-xl font-bold text-xs border-2 border-slate-200 dark:border-slate-700 text-slate-500 bg-transparent transition'; document.getElementById('type_mini').className = t==='minibus'?'flex-1 py-3 rounded-xl font-bold text-xs border-2 border-brand-500 bg-brand-500 text-white transition shadow-lg shadow-rose-500/20':'flex-1 py-3 rounded-xl font-bold text-xs border-2 border-slate-200 dark:border-slate-700 text-slate-500 bg-transparent transition'; }
        function raporuSifirla() { if(confirm('Tüm veriler temizlenecek?')) { araclar=[]; localStorage.setItem('istay_park_data', "[]"); renderList(); raporuKapat(); } }

        renderList();
        setInterval(renderList, 10000); // Her 10 saniyede bir süreleri güncelle
    </script>
</body>
</html>
